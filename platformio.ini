; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[common]
platform = espressif32
board = lolin_s3_mini
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
lib_deps = adafruit/Adafruit NeoPixel @ ^1.12.0
build_flags =
  -DARDUINO_USB_MODE=0
  -DARDUINO_USB_CDC_ON_BOOT=1
board_upload.flash_size = 4MB
board_build.flash_size = 4MB
board_build.flash_mode = dio
board_build.flash_freq = 80m
board_build.partitions = partitions.csv

[env:esp32-s3-com]
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
monitor_filters = ${common.monitor_filters}
lib_deps = ${common.lib_deps}
build_flags = ${common.build_flags}
board_upload.flash_size = ${common.board_upload.flash_size}
board_build.flash_size = ${common.board_build.flash_size}
board_build.flash_mode = ${common.board_build.flash_mode}
board_build.flash_freq = ${common.board_build.flash_freq}
board_build.partitions = ${common.board_build.partitions}
upload_speed = 921600

[env:esp32-s3-ota]
platform = ${common.platform}
board = ${common.board}
framework = ${common.framework}
monitor_speed = ${common.monitor_speed}
monitor_filters = ${common.monitor_filters}
lib_deps = ${common.lib_deps}
build_flags = ${common.build_flags}
board_upload.flash_size = ${common.board_upload.flash_size}
board_build.flash_size = ${common.board_build.flash_size}
board_build.flash_mode = ${common.board_build.flash_mode}
board_build.flash_freq = ${common.board_build.flash_freq}
board_build.partitions = ${common.board_build.partitions}
upload_protocol = espota
upload_port = 192.168.1.136
upload_flags = -p 3232
